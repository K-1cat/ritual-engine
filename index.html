<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual Engine</title>
</head>
<body>

<script src="/layout.js"></script>
<script>
initLayout("home", `
    <h1>Ritual Engine</h1>
    <p><i>記号実行フレームワーク v0.3.7</i></p>

    <hr>

    <h2>概要</h2>
    <p>
        記号的な入力を処理して、決まった手順を実行するためのテスト用システム。
    </p>

    <p>
        もともとはただの実験用コードだったけど、
        いくつか説明できない挙動が出始めた。
    </p>

    <hr>

    <h2>メモ</h2>
    <ul>
        <li>入力パターンによって結果が変わる</li>
        <li>同じ手順でも再現しないことがある</li>
        <li>ログが一部消える（原因不明）</li>
    </ul>

    <hr>

    <h2>ステータス</h2>
    <p id="engine-status">とりあえず動作中。</p>

    <hr>

    <h2>リンク</h2>
    <ul>
        <li><a href="/engine/engine.html">エンジン</a></li>
        <li><a href="/logs/log-01.html">ログ</a></li>
        <li><a href="/archive/redvil.html">アーカイブ</a></li>
    </ul>

    <hr>

    <p style="font-size: 12px; color: #555;">
        ※バックアップ用にそのまま置いてある
    </p>

    <!-- 隠しトリガー -->
    <div id="hidden-trigger" style="opacity:0; height:20px;">.</div>
`);

// =========================
// 状態変化（違和感強め）
if (State.getFlag("visited_logs")) {
    document.getElementById("engine-status").innerText = "一部の出力が一致しない。";
}

// =========================
// 隠しクリック
document.getElementById("hidden-trigger").addEventListener("click", () => {
    State.setFlag("found_entry");
    window.location.href = "/logs/log-01.html";
});

// =========================
// キー入力シークレット
let sequence = [];
window.addEventListener("keydown", (e) => {
    sequence.push(e.key);

    if (sequence.join("").includes("invoke")) {
        State.setFlag("typed_invoke");
        window.location.href = "/hidden/layer2.html";
    }
});
</script>

</body>
</html>
