<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual Engine</title>
</head>
<body>

<script src="./layout.js"></script>
<script>
initLayout("home", `
    <h1>Ritual Engine</h1>
    <p><i>記号実行フレームワーク v0.3.7</i></p>

    <hr>

    <h2>概要</h2>
    <p>
        記号的な入力を処理して、特定の手順を実行するためのテスト用システム。
    </p>

    <p>
        最初は単純なパターン処理の実験だったけど、
        入力の組み合わせによって、想定外の結果が出るようになった。
    </p>

    <p>
        同じ条件でも結果が変わることがある。
        原因はまだよくわかってない。
    </p>

    <hr>

    <h2>現在の挙動</h2>
    <ul>
        <li>入力シーケンスによって出力が変化する</li>
        <li>一部のログが自動的に書き換わる</li>
        <li>再現できない実行結果がある</li>
        <li>未定義の応答が確認されている</li>
    </ul>

    <hr>

    <h2>簡易ログ</h2>
    <pre>
      [04/12] 初期テスト開始
      [04/18] パターン応答のズレを確認
      [04/21] 同一入力で異なる結果
    </pre>

    <hr>

    <h2>ステータス</h2>
    <p id="engine-status">とりあえず動作中。</p>

    <hr>

    <h2>リンク</h2>
    <ul>
        <li><a href="/engine/engine.html">エンジン</a></li>
        <li><a href="/logs/log-01.html">ログ</a></li>
        <li><a href="/archive/redvil.html">アーカイブ</a></li>
    </ul>

    <hr>

    <p style="font-size: 12px; color: #777;">
        ※バックアップ用。あとで整理するかも
    </p>

    <!-- 隠しトリガー -->
    <div id="hidden-trigger" style="opacity:0; height:20px;">.</div>
`);

// =========================
// 状態変化（違和感強め）
if (State.getFlag("visited_logs")) {
    document.getElementById("engine-status").innerText = "一部の出力が一致しない。";
}

// =========================
// 隠しクリック
document.getElementById("hidden-trigger").addEventListener("click", () => {
    State.setFlag("found_entry");
    window.location.href = "/logs/log-01.html";
});

// =========================
// キー入力シークレット
let sequence = [];
window.addEventListener("keydown", (e) => {
    sequence.push(e.key);

    if (sequence.join("").includes("invoke")) {
        State.setFlag("typed_invoke");
        window.location.href = "/hidden/layer2.html";
    }
});
</script>

</body>
</html>
